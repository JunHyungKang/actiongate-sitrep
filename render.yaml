# One-click deploy to Render's free tier. Push this repo to GitHub, then
# "New > Blueprint" on render.com and point it here. Set SITREP_AGENT_SECRET
# (and any BYOK vars) in the Render dashboard.
services:
  - type: web
    name: sitrep-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SITREP_AGENT_SECRET
        sync: false
      - key: LLM_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LLM_API_KEY
        sync: false
      - key: MODEL
        value: meta-llama/llama-3.1-8b-instruct:free
